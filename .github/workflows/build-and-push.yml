name: Build and Push Gateway Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'
      - 'Dockerfile.gateway'
      - 'requirements.txt'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: vllm-sara
      REGION: us-east1
      REPO: vllm-rag-bot
      IMAGE: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/14727602944/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@vllm-sara.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest"

          docker build -f Dockerfile.gateway -t $IMAGE_URI -t $IMAGE_LATEST .
          docker push $IMAGE_URI
          docker push $IMAGE_LATEST

          echo "Pushed: $IMAGE_URI"
