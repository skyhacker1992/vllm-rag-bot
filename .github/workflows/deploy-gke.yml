name: Deploy GKE Cluster

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: vllm-sara
      GCP_REGION: us-east1   # change if you want

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/14727602944/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@vllm-sara.iam.gserviceaccount.com"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x

      - name: Terraform Init
        working-directory: ./terraform/gke
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform/gke
        run: terraform plan -var="project_id=${{ env.GCP_PROJECT_ID }}" -var="region=${{ env.GCP_REGION }}"

      - name: Terraform Apply
        working-directory: ./terraform/gke
        run: terraform apply -auto-approve -var="project_id=${{ env.GCP_PROJECT_ID }}" -var="region=${{ env.GCP_REGION }}"
