name: Deploy Helm Chart

on:
  workflow_dispatch:
  push:
    paths:
      - 'helm/**'
      - 'app/**'
      - 'Dockerfile.gateway'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: vllm-sara
      GKE_CLUSTER: vllm-cluster
      GKE_REGION: us-east1-b
      NAMESPACE: naofpa-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/14727602944/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@vllm-sara.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet || true
          export USE_GKE_GCLOUD_AUTH_PLUGIN=True
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Verify plugin
        run: |
          which gke-gcloud-auth-plugin || echo "Plugin still missing"
          gke-gcloud-auth-plugin --version || true

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy Helm chart
        run: |
          helm upgrade --install naofpa-llm ./helm/naofpa-llm-platform \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --wait \
            --timeout 5m
