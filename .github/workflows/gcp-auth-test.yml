name: Test GCP Authentication

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  auth-test:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: vllm-sara

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/14727602944/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@vllm-sara.iam.gserviceaccount.com"

      - name: Test
        run: |
          echo "✅ Authenticated successfully!"
          gcloud auth list
          gcloud projects describe $GCP_PROJECT_ID
