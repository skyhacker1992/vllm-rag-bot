<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAOFPA LLM Platform</title>
  <style>
    :root { --gold:#d4af77; --bg:#0a0a1f; --panel:#1a1428; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:linear-gradient(180deg,var(--bg),var(--panel));color:#e8d9c0;min-height:100vh}
    .wrap{max-width:900px;margin:0 auto;padding:24px}
    h1{color:var(--gold);margin-bottom:4px}
    .sub{opacity:.7;font-size:.9rem;margin-bottom:20px}
    #log{height:420px;overflow-y:auto;background:rgba(0,0,0,.35);border:1px solid rgba(212,175,119,.25);border-radius:12px;padding:14px}
    .msg{margin-bottom:10px}.user{color:#93c5fd}.bot{color:var(--gold)}
    .row{display:flex;gap:8px;margin-top:12px}
    input,button,textarea{border-radius:10px;border:1px solid rgba(212,175,119,.3);background:#0f0f22;color:#e8d9c0}
    input,textarea{flex:1;padding:10px 12px}
    button{padding:10px 16px;background:var(--gold);color:#111;font-weight:600;cursor:pointer}
    label{font-size:.8rem;opacity:.8}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NAOFPA LLM Platform</h1>
    <p class="sub">vLLM / SGLang serving • RAG • Prometheus metrics • KServe-ready</p>
    <div id="log"></div>
    <div class="row"><label><input type="checkbox" id="rag" checked /> Use RAG</label></div>
    <div class="row">
      <input id="input" placeholder="Ask S.A.R.A anything..." />
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const log = document.getElementById('log');
    const add = (cls, text) => { const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; log.appendChild(d); log.scrollTop=log.scrollHeight; };
    document.getElementById('send').onclick = async () => {
      const msg = document.getElementById('input').value.trim();
      if (!msg) return;
      add('user', 'You: ' + msg);
      document.getElementById('input').value = '';
      const res = await fetch(`/v1/chat?token=${encodeURIComponent(token)}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: msg, use_rag: document.getElementById('rag').checked })
      });
      const data = await res.json();
      add('bot', 'S.A.R.A: ' + (data.reply || data.detail || 'Error'));
    };
    if (!token) add('bot', 'Missing token — open from Reports Hub with ?token=...');
  </script>
</body>
</html>
