{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: CHROMA_HOST
              value: chroma
            - name: CHROMA_PORT
              value: "8000"
            - name: INFERENCE_BACKEND
              value: "vllm"
            - name: DISABLE_AUTH
              value: "true"
            # We'll point this to a real vLLM later
            - name: VLLM_BASE_URL
              value: "http://vllm:8000/v1"
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: {{ .Values.gateway.port }}
{{- end }}
